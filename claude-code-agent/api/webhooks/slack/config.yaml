# Slack Webhook Configuration
# ===========================
# This file configures how the agent responds to Slack events.
# Edit this file to customize commands, triggers, and behavior.

name: slack
description: Slack webhook for commands and mentions
endpoint: /webhooks/slack
source: slack

# Agent Trigger Configuration
# ---------------------------
# How users trigger the agent in Slack messages
agent_trigger:
  prefix: "@agent"
  aliases:
    - "@claude"
    - "@bot"
    - "@ai"
    - "@assistant"

# Default agent for routing tasks
target_agent: brain

# Default command when no specific command is detected
default_command: analyze

# Security Configuration
# ----------------------
security:
  requires_signature: true
  signature_header: X-Slack-Signature
  secret_env_var: SLACK_WEBHOOK_SECRET

# Commands Configuration
# ----------------------
# Each command defines how the agent responds to specific triggers.
# Users trigger commands by mentioning: @agent <command_name> <message>
commands:
  - name: help
    aliases:
      - commands
      - what-can-you-do
      - "?"
      - menu
    description: Show available commands and how to use them
    target_agent: brain
    requires_approval: false
    prompt_template: |
      User asked for help in Slack.

      Channel: {{event.channel}}
      User: {{event.user}}

      Provide a friendly response listing all available commands and how to use them.
      Format the response for Slack using markdown.

  - name: analyze
    aliases:
      - analysis
      - think
      - explain
    description: Analyze a request or question from Slack
    target_agent: brain
    requires_approval: false
    prompt_template: |
      Analyze this Slack message:

      {{event.text}}

      User: {{event.user}}
      Channel: {{event.channel}}

      Provide a helpful and detailed response.

  - name: execute
    aliases:
      - do
      - run
      - perform
    description: Execute a task from Slack (requires approval)
    target_agent: executor
    requires_approval: true
    prompt_template: |
      Execute this request from Slack:

      {{event.text}}

      User: {{event.user}}
      Channel: {{event.channel}}

      Complete the requested task and report back with results.

  - name: code
    aliases:
      - write-code
      - implement
      - develop
    description: Write or generate code based on the request
    target_agent: planning
    requires_approval: false
    prompt_template: |
      Code request from Slack:

      {{event.text}}

      User: {{event.user}}
      Channel: {{event.channel}}

      Generate the requested code with explanations.

  - name: status
    aliases:
      - check
      - progress
      - tasks
    description: Check the status of running tasks
    target_agent: brain
    requires_approval: false
    prompt_template: |
      User requested task status in Slack.

      User: {{event.user}}
      Channel: {{event.channel}}

      Check and report the status of any active or recent tasks.
