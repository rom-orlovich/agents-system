# Jira Webhook Configuration
# ==========================
# This file configures how the agent responds to Jira events.
# Edit this file to customize commands, triggers, and behavior.

name: jira
description: Jira webhook for issue updates and comments
endpoint: /webhooks/jira
source: jira

# Agent Trigger Configuration
# ---------------------------
# How users trigger the agent in Jira comments or by assignment
agent_trigger:
  prefix: "@agent"
  aliases:
    - "@claude"
    - "@bot"
    - "@ai-agent"
  # Jira-specific: Assign a ticket to this user to trigger the agent
  # When a ticket is assigned to this user, the default command runs
  assignee_trigger: "ai-agent"

# Default agent for routing tasks
target_agent: brain

# Default command when no specific command is detected
default_command: analyze

# Security Configuration
# ----------------------
security:
  requires_signature: true
  signature_header: X-Jira-Signature
  secret_env_var: JIRA_WEBHOOK_SECRET

# Commands Configuration
# ----------------------
# Each command defines how the agent responds to specific triggers.
# Users trigger commands by:
#   1. Commenting: @agent <command_name>
#   2. Assigning ticket to the assignee_trigger user
commands:
  - name: analyze
    aliases:
      - analysis
      - analyze-ticket
      - look
      - investigate
    description: Analyze a Jira ticket to understand the problem
    target_agent: planning
    requires_approval: false
    prompt_template: |
      Analyze this Jira ticket:

      Key: {{issue.key}}
      Summary: {{issue.fields.summary}}
      Description: {{issue.fields.description}}

      Project: {{issue.fields.project.name}}
      Issue Type: {{issue.fields.issuetype.name}}
      Priority: {{issue.fields.priority.name}}
      Status: {{issue.fields.status.name}}

      Provide a detailed analysis including:
      1. What is the problem or request?
      2. What technical areas might be affected?
      3. Recommended approach to resolve

  - name: plan
    aliases:
      - plan-fix
      - create-plan
      - design
      - solution
    description: Create a detailed plan to resolve a Jira ticket
    target_agent: planning
    requires_approval: false
    prompt_template: |
      Create a detailed plan to resolve this Jira ticket:

      {{issue.key}}: {{issue.fields.summary}}

      {{issue.fields.description}}

      Project: {{issue.fields.project.name}}

      The plan should include:
      1. Step-by-step implementation approach
      2. Files/components that need to be modified
      3. Testing requirements
      4. Estimated effort breakdown

  - name: fix
    aliases:
      - implement
      - execute
      - do
      - resolve
    description: Implement a fix for a Jira ticket (requires approval)
    target_agent: executor
    requires_approval: true
    prompt_template: |
      Implement a fix for this Jira ticket:

      {{issue.key}}: {{issue.fields.summary}}

      {{issue.fields.description}}

      Project: {{issue.fields.project.name}}

      Execute the implementation following the project's coding standards.

  - name: estimate
    aliases:
      - story-points
      - sizing
      - effort
    description: Provide effort estimation for a ticket
    target_agent: planning
    requires_approval: false
    prompt_template: |
      Estimate the effort for this Jira ticket:

      {{issue.key}}: {{issue.fields.summary}}

      {{issue.fields.description}}

      Provide:
      1. Story point estimate (using Fibonacci scale)
      2. Breakdown of tasks and their relative complexity
      3. Potential risks that might affect the estimate

  - name: help
    aliases:
      - commands
      - what-can-you-do
      - "?"
    description: Show available commands and how to use them
    target_agent: brain
    requires_approval: false
    prompt_template: |
      User requested help in Jira ticket {{issue.key}}.

      Provide a friendly response listing all available commands and how to use them.
