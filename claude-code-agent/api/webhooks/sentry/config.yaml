# Sentry Webhook Configuration
# ============================
# This file configures how the agent responds to Sentry events.
# Edit this file to customize commands, triggers, and behavior.

name: sentry
description: Sentry webhook for error alerts and issue tracking
endpoint: /webhooks/sentry
source: sentry

# Agent Trigger Configuration
# ---------------------------
# Sentry webhooks are automatic - no prefix needed
# The agent responds to error events automatically
agent_trigger:
  prefix: ""  # Empty - Sentry events auto-trigger
  aliases: []

# Default agent for routing tasks
target_agent: planning

# Default command when no specific command is detected
# Sentry events automatically trigger error analysis
default_command: analyze-error

# Security Configuration
# ----------------------
security:
  requires_signature: true
  signature_header: Sentry-Hook-Signature
  secret_env_var: SENTRY_WEBHOOK_SECRET

# Commands Configuration
# ----------------------
# Sentry commands are triggered automatically based on event type.
# Users can also manually trigger via Sentry issue comments.
commands:
  - name: analyze-error
    aliases:
      - analyze
      - investigate
      - debug
    description: Analyze a Sentry error to understand the root cause
    target_agent: planning
    requires_approval: false
    prompt_template: |
      Analyze this Sentry error:

      Title: {{event.title}}
      Message: {{event.message}}

      Level: {{event.level}}
      Environment: {{event.environment}}
      Platform: {{event.platform}}

      URL: {{event.url}}

      Stack Trace:
      {{event.stacktrace}}

      Tags:
      {{event.tags}}

      Provide a detailed analysis including:
      1. What caused this error?
      2. What is the impact?
      3. Recommended fix approach
      4. How to prevent similar errors

  - name: fix-error
    aliases:
      - fix
      - resolve
      - patch
    description: Create a plan to fix a Sentry error
    target_agent: planning
    requires_approval: false
    prompt_template: |
      Create a plan to fix this Sentry error:

      Title: {{event.title}}
      Message: {{event.message}}

      Level: {{event.level}}
      Environment: {{event.environment}}

      URL: {{event.url}}

      Stack Trace:
      {{event.stacktrace}}

      Provide:
      1. Root cause analysis
      2. Step-by-step fix implementation
      3. Testing approach to verify the fix
      4. Monitoring suggestions

  - name: implement-fix
    aliases:
      - execute
      - apply-fix
      - deploy-fix
    description: Implement a fix for a Sentry error (requires approval)
    target_agent: executor
    requires_approval: true
    prompt_template: |
      Implement a fix for this Sentry error:

      Title: {{event.title}}
      Message: {{event.message}}

      Stack Trace:
      {{event.stacktrace}}

      Execute the fix following best practices and ensure proper error handling.

  - name: alert-config
    aliases:
      - configure-alerts
      - alerts
      - monitoring
    description: Suggest alert configuration for similar errors
    target_agent: planning
    requires_approval: false
    prompt_template: |
      Suggest alert configuration for this type of error:

      Title: {{event.title}}
      Level: {{event.level}}
      Environment: {{event.environment}}

      Provide recommendations for:
      1. Alert thresholds
      2. Notification channels
      3. Grouping rules
      4. Resolution workflow
