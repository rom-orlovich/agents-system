# GitHub Webhook Configuration
# ============================
# This file configures how the agent responds to GitHub events.
# Edit this file to customize commands, triggers, and behavior.

name: github
description: GitHub webhook for issues, PRs, and comments
endpoint: /webhooks/github
source: github

# Agent Trigger Configuration
# ---------------------------
# How users trigger the agent in GitHub comments
agent_trigger:
  prefix: "@agent"
  aliases:
    - "@claude"
    - "@bot"
    - "@ai-agent"

# Default agent for routing tasks
target_agent: brain

# Default command when no specific command is detected
default_command: analyze

# Security Configuration
# ----------------------
security:
  requires_signature: true
  signature_header: X-Hub-Signature-256
  secret_env_var: GITHUB_WEBHOOK_SECRET

# Commands Configuration
# ----------------------
# Each command defines how the agent responds to specific triggers.
# Users trigger commands by typing: @agent <command_name>
commands:
  - name: analyze
    aliases:
      - analysis
      - analyze-issue
      - look
      - check
    description: Analyze an issue or PR to understand the problem
    target_agent: planning
    requires_approval: false
    prompt_template: |
      Analyze this GitHub {{event_type}}:

      Title: {{issue.title}}
      Body: {{issue.body}}

      Repository: {{repository.full_name}}
      Issue/PR: #{{issue.number}}

      Provide a detailed analysis of the issue, including:
      1. What is the problem or request?
      2. What are the potential causes or solutions?
      3. What files or areas of the codebase might be affected?

  - name: plan
    aliases:
      - plan-fix
      - create-plan
      - design
    description: Create a detailed plan to fix an issue
    target_agent: planning
    requires_approval: false
    prompt_template: |
      Create a detailed plan to fix this issue:

      {{issue.title}}

      {{issue.body}}

      Repository: {{repository.full_name}}
      Issue: #{{issue.number}}

      The plan should include:
      1. Step-by-step implementation approach
      2. Files that need to be modified
      3. Testing strategy
      4. Potential risks or edge cases

  - name: fix
    aliases:
      - implement
      - execute
      - do
      - solve
    description: Implement a fix for an issue (requires approval)
    target_agent: executor
    requires_approval: true
    prompt_template: |
      Implement a fix for this issue:

      {{issue.title}}

      {{issue.body}}

      Repository: {{repository.full_name}}
      Issue: #{{issue.number}}

      Execute the implementation following best practices and ensure tests pass.

  - name: review
    aliases:
      - code-review
      - review-pr
      - pr-review
    description: Review a pull request
    target_agent: planning
    requires_approval: false
    prompt_template: |
      Review this pull request:

      Title: {{pull_request.title}}
      Body: {{pull_request.body}}

      Repository: {{repository.full_name}}
      PR: #{{pull_request.number}}

      Provide a thorough code review including:
      1. Code quality and best practices
      2. Potential bugs or issues
      3. Security considerations
      4. Suggestions for improvement

  - name: help
    aliases:
      - commands
      - what-can-you-do
      - "?"
    description: Show available commands and how to use them
    target_agent: brain
    requires_approval: false
    prompt_template: |
      User requested help in GitHub issue/PR #{{issue.number}}.

      Provide a friendly response listing all available commands and how to use them.
      Format the response as a GitHub-flavored markdown comment.
